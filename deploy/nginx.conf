# MyCut 前端 nginx：托管 vite 静态产物 + 反代后端。
# 后端服务名 backend、端口 8000（见 docker-compose.yml）。
#
# HTTPS：证书由宿主机 certbot(Let's Encrypt) 签发，通过 docker-compose 的
# /etc/letsencrypt:/etc/letsencrypt:ro 只读挂载进容器。域名 mycut.icu。
# 换域名时改下面的 server_name 和 ssl_certificate 路径即可。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream mycut_backend {
    server backend:8000;
}

# HTTP：全部 301 跳转到 HTTPS
server {
    listen 80;
    server_name mycut.icu www.mycut.icu;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name mycut.icu www.mycut.icu;

    ssl_certificate     /etc/letsencrypt/live/mycut.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mycut.icu/privkey.pem;

    # 上传大视频：放开请求体大小（默认 1m 会挡住上传）
    client_max_body_size 2048m;

    root /usr/share/nginx/html;
    index index.html;

    # --- WebSocket 进度推送：/api/v1/ws/<userId> ---
    # 必须在通用 /api 之前，且带 Upgrade 头，否则连接会被当普通 HTTP 处理。
    location /api/v1/ws/ {
        proxy_pass http://mycut_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # 长连接不超时
        proxy_send_timeout 3600s;
    }

    # --- REST API（含大视频文件 FileResponse）---
    location /api/ {
        proxy_pass http://mycut_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 视频/成片是大文件且渲染/切片耗时长：关闭缓冲、放宽超时
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- 根级健康检查（app_factory 里的 /health，不在 /api 前缀下）---
    location = /health {
        proxy_pass http://mycut_backend;
        proxy_set_header Host $host;
    }

    # --- SPA 前端：找不到的路由回退到 index.html（前端用 hash 路由也不受影响）---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
